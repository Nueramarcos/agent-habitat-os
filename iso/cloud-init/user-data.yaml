#cloud-config
# Agent Habitat OS — Ubuntu 24.04 autoinstall

autoinstall:
  version: 1
  locale: en_US.UTF-8
  keyboard:
    layout: us
  identity:
    hostname: agent-habitat
    username: ubuntu
    password: "ubuntu"
    realname: Agent Habitat Operator
  ssh:
    install-server: true
    allow-pw: true
  storage:
    layout:
      name: direct
  packages:
    - git
    - curl
    - wget
    - jq
    - zsh
    - build-essential
    - python3
    - python3-venv
    - python3-pip
    - ripgrep
    - fd-find
    - openssh-server
    - tmux
  late-commands:
    - curtin in-target -- mkdir -p /home/ubuntu/.config/cockpit /home/ubuntu/.config/agent-habitat /home/ubuntu/bin
    - curtin in-target -- chmod 700 /home/ubuntu/.config/cockpit
    - curtin in-target -- touch /home/ubuntu/.config/cockpit/secrets.env
    - curtin in-target -- chmod 600 /home/ubuntu/.config/cockpit/secrets.env
    - curtin in-target -- bash -c 'echo hybrid > /home/ubuntu/.config/agent-habitat/profile'
    - curtin in-target -- git clone https://github.com/Nueramarcos/agent-habitat-os.git /home/ubuntu/agent-habitat-os
    - curtin in-target -- chown -R ubuntu:ubuntu /home/ubuntu/agent-habitat-os /home/ubuntu/.config
    - curtin in-target -- bash -c 'echo ubuntu:ubuntu | chpasswd'
    - curtin in-target -- install -m 755 /home/ubuntu/agent-habitat-os/scripts/habitat /home/ubuntu/bin/habitat
    - curtin in-target -- bash -c 'cat > /etc/systemd/system/agent-habitat-firstboot.service <<UNIT
[Unit]
Description=Agent Habitat first-boot provisioning
After=network-online.target
Wants=network-online.target
ConditionPathExists=!/home/ubuntu/.habitat-provisioned

[Service]
Type=oneshot
User=ubuntu
WorkingDirectory=/home/ubuntu/agent-habitat-os
ExecStart=/bin/bash /home/ubuntu/agent-habitat-os/first-boot/install.sh
ExecStartPost=/usr/bin/touch /home/ubuntu/.habitat-provisioned
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
UNIT'
    - curtin in-target -- systemctl enable agent-habitat-firstboot.service

# First real boot: network available, then Ollama/Grok/issue-agent install
package_update: true
package_upgrade: false
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  habitat-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: CI smoke checks
        run: bash scripts/ci-smoke.sh

      - name: Demo pytest
        run: |
          cd demo/agent-habitat-demo
          pip install pytest
          PYTHONPATH=. python -m pytest -q

      - name: Verify script syntax
        run: |
          bash -n first-boot/install.sh
          bash -n first-boot/init.sh
          bash -n first-boot/provision.sh
          bash -n scripts/habitat